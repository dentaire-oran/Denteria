var state={page:'home',year:null};

function hashFromState(page,year){
  if(page==='home') return '#home';
  if(page==='year') return '#year-'+year;
  if(page==='calc') return '#calc-'+year;
  return '#home';
}

function stateFromHash(hash){
  if(!hash||hash==='#home'||hash==='#') return {page:'home',year:null};
  var m;
  m=hash.match(/^#year-(\d+)$/); if(m) return {page:'year',year:parseInt(m[1])};
  m=hash.match(/^#calc-(\d+)$/); if(m) return {page:'calc',year:parseInt(m[1])};
  return {page:'home',year:null};
}

function navigate(page,year){
  year=year||null;
  var newHash=hashFromState(page,year);
  if(window.location.hash!==newHash) window.location.hash=newHash;
  var app=document.getElementById('app');
  app.classList.add('page-out');
  setTimeout(function(){
    state.page=page; state.year=year;
    render(); app.classList.remove('page-out');
    updateSidebarNav(); updateBreadcrumb();
    window.scrollTo({top:0,behavior:'smooth'});
  },200);
}

function navigateSilent(page,year){
  year=year||null;
  state.page=page; state.year=year;
  render(); updateSidebarNav(); updateBreadcrumb();
}

window.addEventListener('hashchange',function(){
  var s=stateFromHash(window.location.hash);
  if(s.page!==state.page||s.year!==state.year){
    navigateSilent(s.page,s.year);
  }
});
function render(){
  var app=document.getElementById('app');
  if(state.page==='home') app.innerHTML=renderHome();
  else if(state.page==='year') app.innerHTML=renderYear(state.year);
  else if(state.page==='calc'){app.innerHTML=renderCalc(state.year);initCalcPage(state.year);}

}

  return '<main class="pt-28 pb-32 px-6 max-w-5xl mx-auto text-center"><h1 class="text-5xl md:text-7xl font-bold text-gradient animate-float mb-4" data-key="appTitle">Dental Guide</h1><p class="text-xl mb-16 font-light" style="color:var(--text-muted);" data-key="subtitle">'+t('subtitle')+'</p><div class="grid grid-cols-2 md:grid-cols-3 gap-6">'+btns+'</div></main>';
}

function renderCalc(n){

  return '<main class="pt-28 pb-32 px-4 sm:px-6 max-w-4xl mx-auto text-center"><h1 class="text-4xl md:text-6xl font-bold text-gradient animate-float mb-4" data-key="pageCalc">'+t('pageCalc')+'</h1><p class="text-xl mb-10 font-light" style="color:var(--text-muted);" id="calcSubtitle">'+t('simulFor',t(yk))+'</p><div class="glass p-4 rounded-xl mb-8 text-sm flex items-start gap-3 text-left" style="color:var(--text-main);"><i class="ph-fill ph-info text-2xl text-blue-400 mt-0.5 flex-shrink-0"></i><p data-key="infoText">'+t('infoText')+'</p></div><form id="calcForm" class="space-y-6"></form><div class="mt-10 flex flex-wrap justify-center gap-4"><button type="button" onclick="calculer()" class="btn-action btn-primary bg-indigo-500/50"><i class="ph-bold ph-calculator"></i> <span data-key="btnCalc">'+t('btnCalc')+'</span></button><button type="button" onclick="saveResults()" class="btn-action btn-primary"><i class="ph-bold ph-floppy-disk"></i> <span data-key="btnSave">'+t('btnSave')+'</span></button><button type="button" onclick="loadResults()" class="btn-action btn-primary"><i class="ph-bold ph-upload-simple"></i> <span data-key="btnLoad">'+t('btnLoad')+'</span></button></div><div id="resultat" class="mt-8 space-y-4"></div></main>';
}

var currentCalcYear=null;
function initCalcPage(n){
  currentCalcYear=n;
  var mods=MODULES[n];
  var form=document.getElementById('calcForm');
  if(!form||!mods)return;
  form.innerHTML='';
  for(var i=0;i<mods.length;i++){
    (function(idx){
      var mod=mods[idx];
      var card=document.createElement('div');
      card.className='glass module-card';
      var fh='';
      if(mod.type==='6fields'){
        fh='<div><label class="block text-xs mb-1 opacity-70">EMD S1</label><input type="number" step="0.01" min="0" max="20" id="'+idx+'_emd1" class="calc-input" oninput="calcModule('+idx+')"></div>'+
           '<div><label class="block text-xs mb-1 opacity-70">EMD S2</label><input type="number" step="0.01" min="0" max="20" id="'+idx+'_emd2" class="calc-input" oninput="calcModule('+idx+')"></div>'+
           '<div><label class="block text-xs mb-1 opacity-70">TD S1</label><input type="number" step="0.01" min="0" max="20" id="'+idx+'_td1" class="calc-input" oninput="calcModule('+idx+')"></div>'+
           '<div><label class="block text-xs mb-1 opacity-70">TD S2</label><input type="number" step="0.01" min="0" max="20" id="'+idx+'_td2" class="calc-input" oninput="calcModule('+idx+')"></div>'+
           '<div><label class="block text-xs mb-1 opacity-70">TP S1</label><input type="number" step="0.01" min="0" max="20" id="'+idx+'_tp1" class="calc-input" oninput="calcModule('+idx+')"></div>'+
           '<div><label class="block text-xs mb-1 opacity-70">TP S2</label><input type="number" step="0.01" min="0" max="20" id="'+idx+'_tp2" class="calc-input" oninput="calcModule('+idx+')"></div>';
      } else {
        fh='<div><label class="block text-xs mb-1 opacity-70">EMD S1</label><input type="number" step="0.01" min="0" max="20" id="'+idx+'_emd1" class="calc-input" oninput="calcModule('+idx+')"></div>'+
           '<div><label class="block text-xs mb-1 opacity-70">EMD S2</label><input type="number" step="0.01" min="0" max="20" id="'+idx+'_emd2" class="calc-input" oninput="calcModule('+idx+')"></div>'+
           '<div><label class="block text-xs mb-1 opacity-70">TD</label><input type="number" step="0.01" min="0" max="20" id="'+idx+'_td" class="calc-input" oninput="calcModule('+idx+')"></div>'+
           '<div><label class="block text-xs mb-1 opacity-70">TP</label><input type="number" step="0.01" min="0" max="20" id="'+idx+'_tp" class="calc-input" oninput="calcModule('+idx+')"></div>';
      }
      card.innerHTML='<div class="flex items-center justify-between mb-4 flex-wrap gap-2"><h3 class="text-xl font-bold flex items-center gap-2" style="color:var(--text-main);"><i class="ph-duotone ph-'+mod.icon+' text-2xl text-indigo-400"></i> '+mod.nom+'<span class="text-xs bg-white/10 px-2 py-1 rounded text-white/70 border border-white/10">Coef '+mod.coef+'</span></h3><label class="flex items-center gap-2 text-sm cursor-pointer" style="color:var(--text-muted);"><input type="checkbox" id="'+idx+'_manual_cb" onchange="toggleManual('+idx+')" class="accent-indigo-500 w-4 h-4"><span data-key="manualMode">'+t('manualMode')+'</span></label></div><div id="'+idx+'_manual_container" class="anim-container is-hidden mb-2"><input type="number" step="0.01" min="0" max="20" id="'+idx+'_manual_val" class="calc-input" placeholder="Moyenne (ex: 12.5)" oninput="calcModule('+idx+')"></div><div id="'+idx+'_notes_fields" class="grid grid-cols-2 gap-4 anim-container">'+fh+'</div><div class="mt-4 pt-4 border-t border-white/10 flex justify-end"><div class="font-bold text-lg transition-colors duration-300" id="'+idx+'_display">-</div></div>';
      form.appendChild(card);
    })(i);
  }
}
function gv(id){var el=document.getElementById(id);if(!el||el.value.trim()==='')return NaN;return parseFloat(el.value.replace(',','.'));}
function getModuleMoy(i){
  var n=currentCalcYear; var mod=MODULES[n][i];
  var cb=document.getElementById(i+'_manual_cb');
  if(cb&&cb.checked){var v=gv(i+'_manual_val');return isNaN(v)?{moy:0,filled:false}:{moy:v,filled:true};}
  var pts=0,div=0,filled=false;
  if(mod.type==='6fields'){
    // 1ere annee: EMD x1, TD x2 (x1 si tdLight), TP x2
    var e1=gv(i+'_emd1'),e2=gv(i+'_emd2'),t1=gv(i+'_td1'),t2=gv(i+'_td2'),p1=gv(i+'_tp1'),p2=gv(i+'_tp2');
    var tdW=mod.tdLight?1:2;
    if(!isNaN(e1)){pts+=e1;div+=1;filled=true;} if(!isNaN(e2)){pts+=e2;div+=1;filled=true;}
    if(!isNaN(t1)){pts+=t1*tdW;div+=tdW;filled=true;} if(!isNaN(t2)){pts+=t2*tdW;div+=tdW;filled=true;}
    if(!isNaN(p1)){pts+=p1*2;div+=2;filled=true;} if(!isNaN(p2)){pts+=p2*2;div+=2;filled=true;}
  } else {
    // 2eme: EMD moy x1, TD x1, TP x2
    // 3eme: EMD moy x1, TD x2, TP x2
    var e1=gv(i+'_emd1'),e2=gv(i+'_emd2'),td=gv(i+'_td'),tp=gv(i+'_tp');
    var tdW=(n===2)?1:2;
    var es=0,ec=0;
    if(!isNaN(e1)){es+=e1;ec++;}  if(!isNaN(e2)){es+=e2;ec++;}
    if(ec>0){pts+=(es/ec);div+=1;filled=true;}
    if(!isNaN(td)){pts+=td*tdW;div+=tdW;filled=true;}
    if(!isNaN(tp)){pts+=tp*2;div+=2;filled=true;}
  }
  return{moy:div>0?pts/div:0,filled:filled};
}
function toggleManual(i,animate){
  if(animate===undefined)animate=true;
  var cb=document.getElementById(i+'_manual_cb');
  var mc=document.getElementById(i+'_manual_container');
  var nf=document.getElementById(i+'_notes_fields');
  if(!cb)return;
  if(cb.checked){mc.classList.remove('is-hidden');nf.classList.add('is-hidden');}
  else{nf.classList.remove('is-hidden');mc.classList.add('is-hidden');}
  if(animate)calcModule(i);
}
function calcModule(i){
  var r=getModuleMoy(i); var el=document.getElementById(i+'_display');
  if(!el)return;
  if(r.filled){el.textContent=r.moy.toFixed(2);el.style.color=r.moy<5?'var(--danger)':r.moy<10?'var(--warning)':'var(--success)';}
  else{el.textContent='-';el.style.color='var(--text-main)';}
}
function calculer(){
  var mods=MODULES[currentCalcYear];
  var total=0,coefs=0,u5=[],u10=[],has=false;
  for(var i=0;i<mods.length;i++){
    var r=getModuleMoy(i); calcModule(i);
    if(r.filled){has=true;if(r.moy<5)u5.push(mods[i].nom);else if(r.moy<10)u10.push(mods[i].nom);total+=r.moy*mods[i].coef;coefs+=mods[i].coef;}
  }
  var res=document.getElementById('resultat');
  if(!has||coefs===0){res.innerHTML='<div class="glass p-4 border-l-4 border-yellow-500 text-yellow-200 text-left">'+t('noNotes')+'</div>';return;}
  var avg=(total/coefs).toFixed(2);
  var pass=parseFloat(avg)>=10&&u5.length===0;
  var html='<div class="glass p-6 rounded-2xl animate-float border-t-4 '+(pass?'border-green-400':'border-red-400')+'"><p class="text-lg opacity-80">'+t('genAvg')+'</p><h2 class="text-6xl font-bold my-4 text-gradient">'+avg+'</h2>';
  if(pass){html+='<div class="inline-block px-4 py-2 bg-green-500/20 text-green-300 rounded-full font-bold border border-green-500/30">'+t('validated')+'</div>';}
  else{
    if(parseFloat(avg)<10)html+='<div class="mb-3 inline-block px-4 py-2 bg-red-500/20 text-red-300 rounded-full font-bold border border-red-500/30">'+t('insufficient')+'</div>';
    html+='<div class="mt-4 space-y-2 text-left bg-black/20 p-4 rounded-lg">';
    if(u5.length) html+='<div class="text-sm text-red-300 flex items-start gap-2"><i class="ph-bold ph-warning-circle mt-1"></i><span><strong>'+t('eliminatory')+'</strong> '+u5.join(', ')+'</span></div>';
    if(u10.length)html+='<div class="text-sm text-yellow-300 flex items-start gap-2"><i class="ph-bold ph-info mt-1"></i><span><strong>'+t('compensate')+'</strong> '+u10.join(', ')+'</span></div>';
    html+='</div>';
  }
  html+='</div>';
  res.innerHTML=html; res.scrollIntoView({behavior:'smooth'});
}
function saveResults(){
  var mods=MODULES[currentCalcYear]; var data=[];
  for(var i=0;i<mods.length;i++){
    var cb=document.getElementById(i+'_manual_cb');
    var mv=document.getElementById(i+'_manual_val');
    var e={manual:cb?cb.checked:false,manualVal:mv?mv.value:''};
    if(mods[i].type==='6fields'){e.e1=gv(i+'_emd1')||'';e.e2=gv(i+'_emd2')||'';e.t1=gv(i+'_td1')||'';e.t2=gv(i+'_td2')||'';e.p1=gv(i+'_tp1')||'';e.p2=gv(i+'_tp2')||'';}
    else{e.e1=gv(i+'_emd1')||'';e.e2=gv(i+'_emd2')||'';e.td=gv(i+'_td')||'';e.tp=gv(i+'_tp')||'';}
    data.push(e);
  }
  localStorage.setItem('notes_y'+currentCalcYear,JSON.stringify(data));
  showToast(t('saved'),true);
}
function loadResults(){
  var raw=localStorage.getItem('notes_y'+currentCalcYear);
  if(!raw){showToast(t('noData'));return;}
  try{
    var data=JSON.parse(raw); var mods=MODULES[currentCalcYear];
    for(var i=0;i<data.length;i++){
      if(i>=mods.length)continue;
      var item=data[i];
      var cb=document.getElementById(i+'_manual_cb');
      if(!cb)continue;
      cb.checked=item.manual; toggleManual(i,false);
      function sv(id,v){var el=document.getElementById(id);if(el&&v!==undefined)el.value=v;}
      sv(i+'_manual_val',item.manualVal);
      sv(i+'_emd1',item.e1); sv(i+'_emd2',item.e2);
      if(mods[i].type==='6fields'){sv(i+'_td1',item.t1);sv(i+'_td2',item.t2);sv(i+'_tp1',item.p1);sv(i+'_tp2',item.p2);}
      else{sv(i+'_td',item.td);sv(i+'_tp',item.tp);}
      calcModule(i);
    }
    calculer(); showToast(t('loaded'),true);
  }catch(e){showToast('Erreur.');}
}
function updateSidebarNav(){
  var nav=document.getElementById('sidebarNav'); if(!nav)return;
  var isHome=state.page==='home',isYear=state.page==='year',isCalc=state.page==='calc';
  var yn=state.year; var yk=yn?'year'+yn:null;
  var h='<button onclick="navigate(\'home\');closeMenu();" class="nav-link glass '+(isHome?'active':'')+'"><i class="ph-bold ph-house text-xl"></i><span data-key="home">'+t('home')+'</span></button>';
  if(yn){
    h+='<button onclick="navigate(\'year\','+yn+');closeMenu();" class="nav-link glass '+(isYear?'active':'')+'"><i class="ph-bold ph-graduation-cap text-xl"></i><span>'+t(yk)+'</span></button>';
    if(isCalc)h+='<button onclick="navigate(\'calc\','+yn+');closeMenu();" class="nav-link glass active"><i class="ph-bold ph-calculator text-xl"></i><span data-key="pageCalc">'+t('pageCalc')+'</span></button>';
  }
  h+='<div class="w-full h-px my-2" style="background:var(--glass-border);"></div><button id="installBtn" class="nav-link glass"><i class="ph-bold ph-download-simple text-xl"></i><span data-key="install">'+t('install')+'</span></button><a href="mailto:dentaireoranmoy@gmail.com" class="nav-link glass"><i class="ph-bold ph-envelope text-xl"></i><span data-key="contact">'+t('contact')+'</span></a>';
  nav.innerHTML=h;
  var btn=document.getElementById('installBtn');
  if(btn)btn.addEventListener('click',handleInstall);
}
function updateBreadcrumb(){
  var bc=document.getElementById('breadcrumb');
  if(state.page==='home'){bc.innerHTML='';bc.style.display='none';return;}
  bc.style.display='flex';
  var yk='year'+state.year;
  var p=['<button class="breadcrumb-btn" onclick="navigate(\'home\')"><i class="ph-bold ph-house" style="font-size:0.65rem;"></i> '+t('home')+'</button>'];
  if(state.page==='year'){p.push('<span class="breadcrumb-sep">›</span>');p.push('<span class="breadcrumb-btn" style="color:var(--text-main);cursor:default;">'+t(yk)+'</span>');}
  else if(state.page==='calc'){p.push('<span class="breadcrumb-sep">›</span>');p.push('<button class="breadcrumb-btn" onclick="navigate(\'year\','+state.year+')">'+t(yk)+'</button>');p.push('<span class="breadcrumb-sep">›</span>');p.push('<span class="breadcrumb-btn" style="color:var(--text-main);cursor:default;">'+t('pageCalc')+'</span>');}
  bc.innerHTML=p.join('');
}
function applyTranslations(){
  var lang=getLang(); var els=document.querySelectorAll('[data-key]');
  for(var i=0;i<els.length;i++){var k=els[i].getAttribute('data-key');var v=T[lang][k];if(v&&typeof v==='string')els[i].textContent=v;}
  var sub=document.getElementById('calcSubtitle');
  if(sub&&state.year)sub.textContent=t('simulFor',t('year'+state.year));
}
var langPill=document.getElementById('langPill');
var langBtns=document.querySelectorAll('.lang-btn');
function setLangPill(lang){
  var idx=lang==='fr'?0:lang==='en'?1:2;
  langPill.style.transform='translateX('+(idx*100)+'%)';
  for(var i=0;i<langBtns.length;i++)langBtns[i].classList.toggle('active',langBtns[i].getAttribute('data-lang')===lang);
}
function updateLanguage(lang){
  document.body.classList.add('switching-lang'); setLangPill(lang);
  setTimeout(function(){
    document.documentElement.setAttribute('lang',lang);
    document.documentElement.setAttribute('dir',lang==='ar'?'rtl':'ltr');
    localStorage.setItem('lang',lang);
    applyTranslations(); updateSidebarNav(); updateBreadcrumb();
    requestAnimationFrame(function(){document.body.classList.remove('switching-lang');});
  },300);
}
function initLang(){
  var lang=getLang();
  document.documentElement.setAttribute('lang',lang);
  document.documentElement.setAttribute('dir',lang==='ar'?'rtl':'ltr');
  setLangPill(lang); applyTranslations();
}
for(var _i=0;_i<langBtns.length;_i++){
  (function(btn){btn.addEventListener('click',function(){updateLanguage(btn.getAttribute('data-lang'));});})(langBtns[_i]);
}
function initTheme(){var s=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',s);}
document.getElementById('themeBtn').addEventListener('click',function(){
  var cur=document.documentElement.getAttribute('data-theme');
  var next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
});
var sidebar=document.getElementById('sidebar');
var overlay=document.getElementById('overlay');
var menuBtn=document.getElementById('menuBtn');
menuBtn.onclick=function(e){
  e.stopPropagation(); sidebar.classList.toggle('open');
  overlay.classList.toggle('hidden',!sidebar.classList.contains('open'));
};
window.closeMenu=function(){sidebar.classList.remove('open');overlay.classList.add('hidden');};
window.showToast=function(msg,isSuccess){
  var c=document.getElementById('toastContainer');
  var toast=document.createElement('div');
  toast.className='px-6 py-3 rounded-full glass text-white shadow-2xl flex items-center gap-3 translate-y-10 opacity-0 transition-all duration-500 font-semibold text-sm';
  toast.style.background='rgba(0,0,0,0.85)';
  var icon=isSuccess?'ph-check-circle text-green-400':'ph-clock';
  toast.innerHTML='<i class="ph-bold '+icon+' text-xl"></i><span>'+msg+'</span>';
  c.appendChild(toast);
  requestAnimationFrame(function(){toast.classList.remove('translate-y-10','opacity-0');});
  setTimeout(function(){toast.classList.add('translate-y-10','opacity-0');setTimeout(function(){toast.remove();},500);},2800);
};
var deferredPrompt;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;});
function handleInstall(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;closeMenu();}else showToast(t('toastInstall'));}
initTheme(); initLang();
var _initState=stateFromHash(window.location.hash);
navigateSilent(_initState.page,_initState.year);
updateBreadcrumb();
