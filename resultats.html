<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection vers Oradent</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700&family=Playfair+Display:wght@700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0e27;
            --bg-secondary: #151d3b;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-secondary) 100%);
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* Gradient orb background animé */
        .orb {
            position: absolute;
            border-radius: 50%;
            opacity: 0.08;
            filter: blur(60px);
            animation: orbFloat 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-cyan) 0%, transparent 70%);
            top: -200px;
            left: -150px;
            animation: orbFloat1 12s ease-in-out infinite;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent-blue) 0%, transparent 70%);
            bottom: -100px;
            right: -50px;
            animation: orbFloat2 10s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -40px); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-40px, 30px); }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: containerEnter 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes containerEnter {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Icon avec animation complexe */
        .icon-wrapper {
            height: 80px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon {
            font-size: 3.5rem;
            display: inline-block;
            animation: iconBounce 2.5s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
            filter: drop-shadow(0 8px 16px rgba(59, 130, 246, 0.2));
        }

        @keyframes iconBounce {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-12px) scale(1.05);
            }
        }

        /* Titre avec accent coloré */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 1.2rem;
            line-height: 1.2;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleSlideIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
            opacity: 0;
        }

        @keyframes titleSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Paragraphe avec fade-in progressif */
        p {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.8;
            font-weight: 400;
            animation: textFadeIn 0.9s ease-out 0.3s forwards;
            opacity: 0;
        }

        @keyframes textFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Bouton avec interactions premium */
        .btn {
            position: relative;
            display: inline-block;
            padding: 1rem 2.8rem;
            font-size: 1.05rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-cyan) 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
            font-family: 'Geist', sans-serif;
            animation: buttonEnter 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
            opacity: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes buttonEnter {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Effets de ripple au survol */
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(59, 130, 246, 0.4);
        }

        .btn:active {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.3);
        }

        .btn-text {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
        }

        .btn-arrow {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .btn:hover .btn-arrow {
            transform: translateX(4px);
        }

        /* Animation de sortie */
        .exit-animation {
            animation: exitPage 0.6s cubic-bezier(0.7, 0, 0.84, 0) forwards !important;
        }

        @keyframes exitPage {
            from {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
            to {
                opacity: 0;
                transform: scale(0.95);
                filter: blur(10px);
            }
        }

        /* Loading dots */
        .loading-dots {
            display: inline-block;
            margin-left: 0.4rem;
        }

        .loading-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            margin: 0 3px;
            animation: dotsAnimation 1.4s infinite;
        }

        .loading-dots span:nth-child(1) {
            animation-delay: 0s;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotsAnimation {
            0%, 60%, 100% {
                opacity: 0.4;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-8px);
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .btn {
                padding: 0.9rem 2.2rem;
                font-size: 1rem;
            }

            .icon {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Orbs de fond -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Contenu principal -->
    <div class="container" id="content">
        <div class="icon-wrapper">
            <div class="icon">✨</div>
        </div>

        <h1>Oups ! Ce site a déménagé.</h1>

        <p>Retrouvez-nous dès maintenant sur notre nouvelle plateforme.</p>

        <button class="btn" id="redirectBtn" onclick="goToNewSite()">
            <span class="btn-text">
                Rejoindre la plateforme
                <span class="btn-arrow">→</span>
            </span>
        </button>
    </div>

    <script>
        function goToNewSite() {
            const container = document.getElementById('content');
            const btn = document.getElementById('redirectBtn');

            // Désactiver le bouton
            btn.disabled = true;
            btn.style.cursor = 'wait';

            // Ajouter l'animation de sortie
            container.classList.add('exit-animation');

            // Redirection après l'animation
            setTimeout(() => {
                window.location.href = "https://dentaire-oran.github.io/3rd-year-oradent/";
            }, 600);
        }

        // Amélioration du ressenti avec un délai subtil avant animation
        window.addEventListener('load', () => {
            // Garantir que tout est chargé avant d'afficher
            document.body.style.opacity = '1';
        });

        // Interaction au clavier
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('redirectBtn').click();
            }
        });
    </script>
</body>
</html>
